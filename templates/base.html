{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SaaS Gestão{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{% static 'js/htmx.min.js' %}"></script>

    <style>
        body { min-height: 100vh; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; transition: 0.2s; }
        .sidebar a:hover { color: #fff; background-color: #343a40; border-left: 4px solid #0d6efd; }
        .content-area { flex-grow: 1; padding: 20px; }
    </style>
</head>
<body class="d-flex">

    {% include 'partials/layout/_sidebar.html' %}

    <div class="content-area">
        
        {% include 'partials/layout/_topbar.html' %}

        <main>
            {% block content %}
            {% endblock %}
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
