{% extends 'base.html' %}
{% block title %}Categorias | SaaS Gestão{% endblock %}
{% block page_title %}Categorias de Produtos{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4 d-flex justify-content-between align-items-center">
        <div class="w-50">
            <div class="input-group shadow-sm">
                <input type="text" id="campo-busca-cat" name="q" class="form-control" placeholder="Buscar categoria..."
                    hx-get="{% url 'produtos:categoria_lista' %}" hx-trigger="input changed delay:500ms, search" hx-target="#tabela-container">
                <button class="btn btn-outline-secondary bg-light" type="button" 
                    onclick="document.getElementById('campo-busca-cat').value=''; htmx.trigger('#campo-busca-cat', 'input');">✖</button>
            </div>
        </div>
        <a href="{% url 'produtos:categoria_cadastro' %}" class="btn btn-primary shadow-sm">+ Nova Categoria</a>
    </div>
</div>
<div class="card shadow-sm border-0">
    <div class="card-body p-0" id="tabela-container">
        {% include 'partials/produtos/_tabela_categorias.html' %}
    </div>
</div>
{% endblock %}
