{% extends 'base.html' %}
{% block title %}Extrato de Estoque | SaaS Gestão{% endblock %}
{% block page_title %}Histórico de Movimentações (Kardex){% endblock %}

{% block content %}
<div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4 d-flex justify-content-between align-items-center">
        <div class="w-50">
            <div class="input-group shadow-sm">
                <input type="text" id="campo-busca" name="q" class="form-control" placeholder="Buscar produto ou motivo..."
                    hx-get="{% url 'estoque:lista' %}" hx-trigger="input changed delay:500ms, search" hx-target="#tabela-container">
                <button class="btn btn-outline-secondary bg-light" type="button" 
                    onclick="document.getElementById('campo-busca').value=''; htmx.trigger('#campo-busca', 'input');">✖</button>
            </div>
        </div>
        
        <button class="btn btn-warning shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#modalAjuste">
            ⚠️ Novo Ajuste Manual
        </button>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0" id="tabela-container">
        {% include 'partials/estoque/_tabela.html' %}
    </div>
</div>

<div class="modal fade" id="modalAjuste" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning text-dark">
        <h5 class="modal-title fw-bold">Registrar Ajuste Manual</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light" id="container-do-formulario">
        <div hx-get="{% url 'estoque:ajuste' %}" hx-trigger="load">
            Carregando formulário...
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
