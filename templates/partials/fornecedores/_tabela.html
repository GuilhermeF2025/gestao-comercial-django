<table class="table table-hover align-middle mb-0">
    <thead class="table-light">
        <tr>
            <th style="width: 40px;"><input type="checkbox" class="form-check-input" onclick="toggleAllCheckboxes(this)"></th>
            <th>Razão Social</th>
            <th>CNPJ</th>
            <th>Contato</th>
            <th class="text-center">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for fornecedor in fornecedores %}
        <tr id="fornecedor-{{ fornecedor.id }}">
            <td><input type="checkbox" name="selected_ids" value="{{ fornecedor.id }}" class="form-check-input supplier-checkbox"></td>
            <td><strong>{{ fornecedor.name }}</strong></td>
            <td>{{ fornecedor.cnpj }}</td>
            <td>
                <div class="small">
                    {% if fornecedor.email %}<div>📧 {{ fornecedor.email }}</div>{% endif %}
                    {% if fornecedor.phone %}<div>📞 {{ fornecedor.phone }}</div>{% endif %}
                </div>
            </td>
            <td class="text-center">
                <div class="btn-group btn-group-sm">
                    <a href="{% url 'fornecedores:editar' fornecedor.id %}" class="btn btn-outline-primary">✏️</a>
                    <button class="btn btn-outline-danger" 
                        hx-post="{% url 'fornecedores:deletar' fornecedor.id %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' 
                        hx-confirm="Deseja desativar este fornecedor?"
                        hx-target="#fornecedor-{{ fornecedor.id }}" hx-swap="outerHTML swap:1s">🗑️</button>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="text-center py-4 text-muted">Nenhum fornecedor encontrado.</td></tr>
        {% endfor %}
    </tbody>
</table>
<script>
    function toggleAllCheckboxes(master) {
        const checkboxes = document.getElementsByClassName('supplier-checkbox');
        for (let i = 0; i < checkboxes.length; i++) checkboxes[i].checked = master.checked;
    }
</script>
