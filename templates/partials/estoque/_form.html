<form hx-post="{% url 'estoque:ajuste' %}" hx-target="#container-do-formulario" hx-swap="innerHTML" novalidate>
    {% csrf_token %}
    {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
    
    <div class="row g-3">
        {% for field in form %}
            <div class="col-md-12">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small mt-1"><strong>Erro:</strong> {{ field.errors.0 }}</div>{% endif %}
            </div>
        {% endfor %}
    </div>
    
    <hr class="my-4">
    <button type="submit" class="btn btn-warning w-100 fw-bold py-2">⚠️ Confirmar Ajuste</button>
</form>
