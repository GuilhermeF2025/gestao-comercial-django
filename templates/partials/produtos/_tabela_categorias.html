<table class="table table-hover align-middle mb-0">
    <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Nome da Categoria</th>
            <th>Descrição</th>
            <th class="text-center">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for categoria in categorias %}
        <tr id="categoria-{{ categoria.id }}">
            <td class="text-muted">#{{ categoria.id }}</td>
            <td><strong>{{ categoria.name }}</strong></td>
            <td>{{ categoria.description|truncatechars:50 }}</td>
            <td class="text-center">
                <div class="btn-group btn-group-sm">
                    <a href="{% url 'produtos:categoria_editar' categoria.id %}" class="btn btn-outline-primary">✏️</a>
                    <button class="btn btn-outline-danger" 
                        hx-post="{% url 'produtos:categoria_deletar' categoria.id %}"
                        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' 
                        hx-confirm="Deletar permanentemente esta categoria?"
                        hx-target="#categoria-{{ categoria.id }}"
                        hx-swap="outerHTML swap:1s">🗑️</button>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-center py-4 text-muted">Nenhuma categoria encontrada.</td></tr>
        {% endfor %}
    </tbody>
</table>
