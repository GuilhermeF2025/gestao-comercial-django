<form 
    hx-post="{% url 'produtos:cadastro' %}" 
    hx-target="#container-do-formulario" 
    hx-swap="innerHTML"
    novalidate>

    {% csrf_token %}

    {% if form.non_field_errors %}
        <div class="alert alert-danger">
            {{ form.non_field_errors }}
        </div>
    {% endif %}

    <div class="row g-3">
        {% for field in form %}
            <div class="col-md-6">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                
                {% if field.errors %}
                    <div class="text-danger small mt-1">
                        <strong>Erro:</strong> {{ field.errors.0 }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
    </div>

    <hr class="my-4">
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success px-4 py-2">
            💾 Salvar Produto
        </button>
        <a href="{% url 'produtos:cadastro' %}" class="btn btn-outline-secondary">Limpar</a>
    </div>
</form>
